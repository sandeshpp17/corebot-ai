services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: corebot
      POSTGRES_USER: ${DB_USER:-corebot}
      POSTGRES_PASSWORD: ${DB_PASS:-corebot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-corebot}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-phi3:mini}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama show "$OLLAMA_CHAT_MODEL" >/dev/null 2>&1 || ollama pull "$OLLAMA_CHAT_MODEL"
        if [ "$OLLAMA_EMBED_MODEL" != "$OLLAMA_CHAT_MODEL" ]; then
          ollama show "$OLLAMA_EMBED_MODEL" >/dev/null 2>&1 || ollama pull "$OLLAMA_EMBED_MODEL"
        fi
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      API_KEY: ${API_KEY:-corebot-dev-key}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET,POST,OPTIONS}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-Authorization,Content-Type,X-API-Key}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-corebot}:${DB_PASS:-corebot}@postgres:5432/corebot
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-phi3:mini}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      OLLAMA_TIMEOUT_SEC: ${OLLAMA_TIMEOUT_SEC:-120}
      OLLAMA_EMBED_CONCURRENCY: ${OLLAMA_EMBED_CONCURRENCY:-8}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CACHE_TTL_SEC: ${CACHE_TTL_SEC:-300}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5242880}
      MAX_HISTORY_MESSAGES: ${MAX_HISTORY_MESSAGES:-20}
      MAX_MESSAGE_CHARS: ${MAX_MESSAGE_CHARS:-4000}
      ALLOWED_MIME_TYPES: ${ALLOWED_MIME_TYPES:-text/plain,text/markdown,application/json}
      MAX_INGEST_JOBS: ${MAX_INGEST_JOBS:-200}
      INGEST_JOB_TTL_SEC: ${INGEST_JOB_TTL_SEC:-3600}
      WEBAPP_TOOLS_ENABLED: ${WEBAPP_TOOLS_ENABLED:-false}
      WEBAPP_DIAGNOSTICS_BASE_URL: ${WEBAPP_DIAGNOSTICS_BASE_URL:-}
      WEBAPP_DIAGNOSTICS_TOKEN: ${WEBAPP_DIAGNOSTICS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  ollama:
